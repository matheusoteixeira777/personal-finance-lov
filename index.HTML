<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Controle Financeiro - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        /* Cards de Resumo */
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 0.9em; text-transform: uppercase; }
        .card p { font-size: 1.8em; margin: 10px 0 0; font-weight: bold; }
        #total-saldo { color: var(--primary); }
        #total-receita { color: var(--secondary); }
        #total-despesa { color: var(--danger); }

        /* Formulário e Gráficos */
        .main-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .form-section, .chart-section { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--secondary); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: var(--primary); color: white; }
        .btn-delete { background: var(--danger); padding: 5px 10px; font-size: 0.8em; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>Controle Financeiro Pessoal</h1>

    <div class="summary">
        <div class="card"><h3>Saldo Atual</h3><p id="total-saldo">R$ 0,00</p></div>
        <div class="card"><h3>Receitas</h3><p id="total-receita">R$ 0,00</p></div>
        <div class="card"><h3>Despesas</h3><p id="total-despesa">R$ 0,00</p></div>
    </div>

    <div class="main-grid">
        <div class="form-section">
            <h3>Novo Lançamento</h3>
            <input type="date" id="data" required>
            <input type="text" id="descricao" placeholder="Descrição (Ex: Aluguel)">
            <input type="number" id="valor" placeholder="Valor (Ex: 150.50)">
            <input type="text" id="categoria" placeholder="Categoria (Ex: Lazer, Fixa)">
            <select id="tipo">
                <option value="receita">Receita (+)</option>
                <option value="despesa">Despesa (-)</option>
            </select>
            <button onclick="adicionarLancamento()">Adicionar</button>
        </div>

        <div class="chart-section">
            <canvas id="meuGrafico"></canvas>
        </div>
    </div>

    <h3>Histórico de Janeiro</h3>
    <table id="tabela-financeira">
        <thead>
            <tr>
                <th>Data</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Tipo</th>
                <th>Valor</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
    </table>
</div>

<script>
    let transacoes = JSON.parse(localStorage.getItem('finance_data')) || [];
    let meuGrafico;

    function atualizarDashboard() {
        const corpoTabela = document.getElementById('corpo-tabela');
        corpoTabela.innerHTML = '';
        
        let receita = 0; let despesa = 0;
        let categoriasData = {};

        transacoes.sort((a, b) => new Date(a.data) - new Date(b.data)).forEach((t, index) => {
            if(t.tipo === 'receita') receita += parseFloat(t.valor);
            else {
                despesa += parseFloat(t.valor);
                categoriasData[t.categoria] = (categoriasData[t.categoria] || 0) + parseFloat(t.valor);
            }

            corpoTabela.innerHTML += `
                <tr>
                    <td>${t.data}</td>
                    <td>${t.descricao}</td>
                    <td>${t.categoria}</td>
                    <td style="color: ${t.tipo === 'receita' ? 'green' : 'red'}">${t.tipo.toUpperCase()}</td>
                    <td>R$ ${parseFloat(t.valor).toFixed(2)}</td>
                    <td><button class="btn-delete" onclick="removerLancamento(${index})">X</button></td>
                </tr>
            `;
        });

        document.getElementById('total-saldo').innerText = `R$ ${(receita - despesa).toFixed(2)}`;
        document.getElementById('total-receita').innerText = `R$ ${receita.toFixed(2)}`;
        document.getElementById('total-despesa').innerText = `R$ ${despesa.toFixed(2)}`;

        atualizarGrafico(categoriasData);
        localStorage.setItem('finance_data', JSON.stringify(transacoes));
    }

    function adicionarLancamento() {
        const data = document.getElementById('data').value;
        const descricao = document.getElementById('descricao').value;
        const valor = document.getElementById('valor').value;
        const categoria = document.getElementById('categoria').value || 'Geral';
        const tipo = document.getElementById('tipo').value;

        if(!data || !valor) return alert("Preencha data e valor!");

        transacoes.push({ data, descricao, valor, categoria, tipo });
        atualizarDashboard();
    }

    function removerLancamento(index) {
        transacoes.splice(index, 1);
        atualizarDashboard();
    }

    function atualizarGrafico(dados) {
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        if (meuGrafico) meuGrafico.destroy();

        meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(dados),
                datasets: [{
                    label: 'Despesas por Categoria',
                    data: Object.values(dados),
                    backgroundColor: '#e74c3c'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Iniciar com dados hoje
    document.getElementById('data').valueAsDate = new Date();
    atualizarDashboard();
</script>

</body>
</html>
