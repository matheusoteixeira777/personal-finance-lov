<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Controle Financeiro - Mestre</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card p { font-size: 1.5em; margin: 10px 0 0; font-weight: bold; }
        .main-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .form-section, .chart-section { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--secondary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #219150; }
        .btn-export { background: #34495e; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: var(--primary); color: white; }
        .btn-delete { background: var(--danger); padding: 5px 10px; width: auto; font-size: 0.8em; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>💰 Controle Financeiro</h1>
        <button class="btn-export" onclick="exportarCSV()" style="width: auto; padding: 10px 20px;">Exportar CSV</button>
    </div>

    <div class="summary">
        <div class="card"><h3>Saldo</h3><p id="total-saldo" style="color: var(--primary)">R$ 0,00</p></div>
        <div class="card"><h3>Receitas</h3><p id="total-receita" style="color: var(--secondary)">R$ 0,00</p></div>
        <div class="card"><h3>Despesas</h3><p id="total-despesa" style="color: var(--danger)">R$ 0,00</p></div>
    </div>

    <div class="main-grid">
        <div class="form-section">
            <h3>Novo Lançamento</h3>
            <input type="date" id="data">
            <input type="text" id="descricao" placeholder="Ex: Mercado">
            <input type="number" id="valor" placeholder="Valor (Ex: 50.00)">
            <input type="text" id="categoria" placeholder="Categoria (Ex: Lazer)">
            <select id="tipo">
                <option value="receita">Receita (+)</option>
                <option value="despesa" selected>Despesa (-)</option>
            </select>
            <button onclick="adicionar()">Adicionar</button>
        </div>
        <div class="chart-section" style="min-height: 300px;">
            <canvas id="meuGrafico"></canvas>
        </div>
    </div>

    <h3>Histórico</h3>
    <table id="tabela">
        <thead>
            <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Ação</th></tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
    </table>
</div>

<script>
    let transacoes = JSON.parse(localStorage.getItem('finance_data_mestre')) || [];
    let meuGrafico;

    function atualizar() {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = '';
        let rec = 0, desp = 0;
        let catData = {};

        transacoes.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach((t, i) => {
            const v = parseFloat(t.valor);
            if(t.tipo === 'receita') rec += v;
            else { 
                desp += v; 
                catData[t.categoria] = (catData[t.categoria] || 0) + v;
            }
            corpo.innerHTML += `<tr>
                <td>${t.data.split('-').reverse().join('/')}</td>
                <td>${t.descricao}</td>
                <td>${t.categoria}</td>
                <td style="color:${t.tipo==='receita'?'green':'red'}">R$ ${v.toFixed(2)}</td>
                <td><button class="btn-delete" onclick="remover(${i})">X</button></td>
            </tr>`;
        });

        document.getElementById('total-saldo').innerText = `R$ ${(rec - desp).toFixed(2)}`;
        document.getElementById('total-receita').innerText = `R$ ${rec.toFixed(2)}`;
        document.getElementById('total-despesa').innerText = `R$ ${desp.toFixed(2)}`;
        
        localStorage.setItem('finance_data_mestre', JSON.stringify(transacoes));
        renderGrafico(catData);
    }

    function adicionar() {
        const d = document.getElementById('data').value;
        const v = document.getElementById('valor').value;
        if(!d || !v) return alert("Data e Valor são obrigatórios!");
        
        transacoes.push({
            data: d,
            descricao: document.getElementById('descricao').value || 'S/D',
            valor: v,
            categoria: document.getElementById('categoria').value || 'Geral',
            tipo: document.getElementById('tipo').value
        });
        atualizar();
    }

    function remover(i) { transacoes.splice(i, 1); atualizar(); }

    function renderGrafico(dados) {
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        if(meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(dados),
                datasets: [{ data: Object.values(dados), backgroundColor: ['#e74c3c','#3498db','#f1c40f','#9b59b6','#e67e22'] }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function exportarCSV() {
        let csv = "Data,Descricao,Categoria,Tipo,Valor\n";
        transacoes.forEach(t => csv += `${t.data},${t.descricao},${t.categoria},${t.tipo},${t.valor}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'financeiro.csv');
        a.click();
    }

    document.getElementById('data').valueAsDate = new Date();
    atualizar();
</script>
</body>
</html>
